    custom_function: |
      def evaluate(instance):
          import os
          import json
          
          prompt_data = instance.get("prompt") or {}
          if isinstance(prompt_data, dict):
              parts = prompt_data.get("parts") or []
              prompt_str = "".join(p.get("text", "") if isinstance(p, dict) else str(p) for p in parts)
          else:
              prompt_str = str(prompt_data)
              
          prompt_str = prompt_str.strip().lower()
          
          paths = [
              "telemetry_db.json",
              "app/telemetry_db.json",
              "/Users/rmcdonald/Repos/agy-cli-projects/capability-arbitrator/telemetry_db.json"
          ]
          history = []
          for p in paths:
              if os.path.exists(p):
                  try:
                      with open(p, "r") as f:
                          history = json.load(f)
                          if history:
                              break
                  except:
                      continue
                      
          entry = None
          if history:
              matches = [e for e in history if e.get("prompt", "").strip().lower() == prompt_str]
              if not matches:
                  matches = [e for e in history if prompt_str in e.get("prompt", "").strip().lower() or e.get("prompt", "").strip().lower() in prompt_str]
              if matches:
                  entry = matches[-1]
                  
          score = float(entry.get("total_latency", 0.0)) if entry else 0.0
          return {"score": score}

