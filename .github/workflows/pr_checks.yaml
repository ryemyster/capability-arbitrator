name: Agent Validation

on:
  pull_request:
    branches:
      - develop
  push:
    branches:
      - develop
  workflow_dispatch:

jobs:
  local-agent-validation:
    name: Local agent validation
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python 3.12
        uses: actions/setup-python@v4
        with:
          python-version: "3.12"

      - name: Install uv
        uses: astral-sh/setup-uv@v8.0.0

      - name: Install dependencies
        run: uv sync --locked

      - name: Run unit and integration tests
        run: uv run pytest

      - name: Smoke test arbitrator CLI
        env:
          INTEGRATION_TEST: "TRUE"
        run: |
          uv run arbitrator run "My SSN is 123-45-6789"
          uv run arbitrator stride-heal --help
          uv run arbitrator flywheel --help
