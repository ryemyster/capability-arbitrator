# STRIDE Self-Healing — Three-layer surface control
# [EXPERIMENTAL] Ambient supervisor mode. See docs/ARCHITECTURE.md for design notes.
# Safe defaults: master disabled, arbitrator on, ambient off.
# Do not store secrets in this file.
stride_self_healing:
  enabled: false           # Master flag — false = complete no-op, overrides all surfaces
  arbitrator:
    enabled: true          # Direct CLI surface: `arbitrator stride-heal`
  ambient:
    enabled: false         # [EXPERIMENTAL] Event-driven background surface
  mode: audit_only         # audit_only | propose_patch | apply_patch | open_pr
  detection:
    severity_threshold: medium
    checks:
      - hardcoded_secrets
      - unsafe_shell
      - missing_input_validation
  verification:
    commands:
      - "uv run pytest tests/unit/ -x -q"
    max_attempts: 3
  github:
    pr_base: develop
    require_manual_review: true
